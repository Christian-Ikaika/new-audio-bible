<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Bible</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  .header { background: #111118; border-bottom: 1px solid #22222f; padding: 16px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header-icon { color: #0ea5e9; font-size: 22px; }
  .nav-link { margin-left: auto; color: #0ea5e9; text-decoration: none; font-size: 14px; font-weight: 500; }
  .main { max-width: 640px; margin: 0 auto; padding: 24px 16px 120px; }
  .section { margin-bottom: 32px; }
  .section h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .section p { color: #94a3b8; font-size: 14px; }
  .card { background: #111118; border: 1px solid #22222f; border-radius: 16px; padding: 20px; }
  .import-label { font-size: 13px; color: #94a3b8; font-weight: 500; margin-bottom: 8px; display: block; }
  .import-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .import-input { flex: 1; min-width: 200px; background: #1a1a24; border: 1px solid #2d2d3d; border-radius: 12px; padding: 12px 16px; color: #e2e8f0; font-size: 14px; outline: none; }
  .import-input:focus { border-color: #0ea5e9; }
  .import-input::placeholder { color: #4a4a6a; }
  .btn { background: #0284c7; color: white; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .btn:hover { background: #0ea5e9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 10px; }
  .btn-danger { background: transparent; color: #f87171; border: 1px solid #3d1a1a; border-radius: 10px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  .btn-danger:hover { background: #3d1a1a; }
  .error { color: #f87171; font-size: 13px; margin-top: 10px; display: flex; gap: 6px; }
  .hint { color: #4a4a6a; font-size: 12px; margin-top: 8px; }
  .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .playlist-card { background: #111118; border: 1px solid #22222f; border-radius: 16px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; text-decoration: none; color: inherit; display: block; }
  .playlist-card:hover { border-color: #2d2d3d; }
  .playlist-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #1a1a24; display: flex; align-items: center; justify-content: center; font-size: 40px; }
  .playlist-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .playlist-info { padding: 14px; }
  .playlist-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
  .playlist-meta { font-size: 12px; color: #64748b; }
  .playlist-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .progress-bar-wrap { margin-top: 8px; }
  .progress-bar-bg { height: 3px; background: #22222f; border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #0ea5e9; border-radius: 2px; transition: width 0.3s; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; margin-bottom: 4px; }
  .empty-state { text-align: center; padding: 48px 16px; color: #64748b; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  /* Player */
  .player { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(17,17,24,0.97); border-top: 1px solid #22222f; backdrop-filter: blur(12px); z-index: 200; }
  .player-progress { width: 100%; height: 4px; background: #22222f; cursor: pointer; appearance: none; display: block; }
  .player-progress::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #0ea5e9; margin-top: -5px; cursor: pointer; }
  .player-progress::-webkit-slider-runnable-track { height: 4px; }
  .player-body { display: flex; align-items: center; gap: 10px; padding: 12px 16px; max-width: 640px; margin: 0 auto; }
  .player-thumb { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; background: #1a1a24; flex-shrink: 0; font-size: 20px; display: flex; align-items: center; justify-content: center; }
  .player-info { flex: 1; min-width: 0; }
  .player-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-time { font-size: 11px; color: #64748b; margin-top: 2px; }
  .player-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .ctrl-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 6px; border-radius: 8px; font-size: 18px; transition: color 0.15s; display: flex; align-items: center; }
  .ctrl-btn:hover { color: #e2e8f0; }
  .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .play-btn { background: #0284c7; color: white; width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
  .play-btn:hover { background: #0ea5e9; }
  .speed-btn { font-size: 12px; font-weight: 600; color: #94a3b8; background: none; border: none; cursor: pointer; padding: 6px 8px; border-radius: 8px; }
  .speed-btn:hover { color: #e2e8f0; background: #1a1a24; }
  /* Playlist detail */
  .back-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 22px; padding: 0; display: flex; align-items: center; }
  .back-btn:hover { color: #e2e8f0; }
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-input { width: 100%; background: #1a1a24; border: 1px solid #22222f; border-radius: 12px; padding: 10px 16px 10px 38px; color: #e2e8f0; font-size: 14px; outline: none; }
  .search-input:focus { border-color: #0ea5e9; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #4a4a6a; font-size: 16px; }
  .now-playing-card { background: #0c1a2a; border: 1px solid #0e3a5a; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
  .now-playing-label { font-size: 11px; color: #0ea5e9; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .now-playing-title { font-size: 14px; font-weight: 600; }
  .track-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: background 0.1s; }
  .track-row:hover { background: #1a1a24; }
  .track-row.active { background: linear-gradient(90deg, rgba(14,165,233,0.12) 0%, transparent 100%); border-left: 2px solid #0ea5e9; padding-left: 10px; }
  .track-num { width: 28px; text-align: center; font-size: 12px; color: #4a4a6a; flex-shrink: 0; }
  .track-title { flex: 1; font-size: 13px; font-weight: 500; line-height: 1.3; }
  .track-title.active { color: #0ea5e9; }
  .track-ref { font-size: 11px; color: #64748b; margin-top: 2px; }
  .check-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #4a4a6a; padding: 4px; border-radius: 6px; flex-shrink: 0; }
  .check-btn.done { color: #0ea5e9; }
  .playing-bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; width: 16px; }
  .bar { width: 3px; background: #0ea5e9; border-radius: 2px; animation: bounce 0.8s ease infinite; }
  .bar:nth-child(2) { animation-delay: 0.15s; }
  .bar:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,100% { height: 40%; } 50% { height: 100%; } }
  .yt-hidden { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; overflow: hidden; top: -9999px; }
  .view-toggle { display: flex; background: #111118; border: 1px solid #22222f; border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 12px; }
  .view-btn { flex: 1; padding: 8px; border: none; background: none; color: #64748b; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; }
  .view-btn.active { background: #1a1a24; color: #e2e8f0; }
  .book-group { border: 1px solid #22222f; border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
  .book-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #111118; border: none; color: #e2e8f0; cursor: pointer; font-size: 14px; font-weight: 600; text-align: left; }
  .book-header:hover { background: #1a1a24; }
  .book-chapters { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; padding: 10px; background: #0a0a0f; }
  .ch-btn { padding: 8px 4px; border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; background: #1a1a24; color: #94a3b8; }
  .ch-btn:hover { background: #22222f; color: #e2e8f0; }
  .ch-btn.active { background: #0284c7; color: white; }
  .ch-btn.done { background: #0c1a2a; color: #0ea5e9; border: 1px solid #0e3a5a; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .page { display: none; }
  .page.active { display: block; }
  .continue-card { display: flex; align-items: center; gap: 16px; background: rgba(14,165,233,0.08); border: 1px solid rgba(14,165,233,0.2); border-radius: 16px; padding: 16px; cursor: pointer; text-decoration: none; color: inherit; margin-bottom: 24px; transition: background 0.2s; }
  .continue-card:hover { background: rgba(14,165,233,0.14); }
  .continue-thumb { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; background: #1a1a24; flex-shrink: 0; font-size: 24px; display: flex; align-items: center; justify-content: center; }
  .continue-label { font-size: 11px; color: #0ea5e9; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .continue-title { font-size: 14px; font-weight: 600; }
  .continue-sub { font-size: 12px; color: #64748b; margin-top: 2px; }
  .tag { display: inline-block; font-size: 11px; background: rgba(14,165,233,0.1); color: #0ea5e9; border: 1px solid rgba(14,165,233,0.2); border-radius: 20px; padding: 2px 8px; margin-right: 4px; margin-top: 6px; }
</style>
</head>
<body>

<div class="yt-hidden" id="yt-container"><div id="yt-player"></div></div>

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <div class="header">
    <span class="header-icon">📖</span>
    <h1>Audio Bible</h1>
    <a href="#" class="nav-link" id="nav-library" style="display:none">Library</a>
  </div>
  <div class="main">
    <div class="section">
      <h2>Your personal Bible listener</h2>
      <p>Paste a YouTube playlist to start listening. Your progress is saved locally.</p>
    </div>
    <div class="card section">
      <p style="font-size:13px;color:#94a3b8;margin-bottom:14px;">Playlists are loaded automatically from the LSB Audio Bible channel.</p>
      <button class="btn" id="sync-btn" style="width:100%;">🔄 Sync Playlists from LSB Audio Bible</button>
      <div id="import-error" class="error" style="display:none"></div>
    </div>
    <div id="continue-section"></div>
    <div id="library-preview"></div>
  </div>
</div>

<!-- LIBRARY PAGE -->
<div id="page-library" class="page">
  <div class="header">
    <button class="back-btn" id="library-back">‹</button>
    <h1>Library</h1>
  </div>
  <div class="main">
    <div id="library-grid"></div>
  </div>
</div>

<!-- PLAYLIST PAGE -->
<div id="page-playlist" class="page">
  <div class="header">
    <button class="back-btn" id="playlist-back">‹</button>
    <div style="flex:1;min-width:0;">
      <div id="playlist-header-title" style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
      <div id="playlist-header-meta" style="font-size:12px;color:#64748b;margin-top:2px;"></div>
    </div>
  </div>
  <div id="playlist-progress-bar" style="height:2px;background:#22222f;display:none"><div id="playlist-progress-fill" style="height:100%;background:#0ea5e9;transition:width 0.3s;width:0%"></div></div>
  <div class="main">
    <div id="now-playing-card" style="display:none" class="now-playing-card">
      <div class="now-playing-label">Now playing</div>
      <div id="now-playing-title" class="now-playing-title"></div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="track-search" type="search" placeholder="Search tracks…" />
    </div>
    <div id="view-toggle-wrap" class="view-toggle" style="display:none">
      <button class="view-btn active" id="view-list-btn" onclick="setView('list')">List</button>
      <button class="view-btn" id="view-books-btn" onclick="setView('books')">Books</button>
    </div>
    <div id="track-list"></div>
    <div id="book-nav"></div>
  </div>
</div>

<!-- STICKY PLAYER -->
<div class="player" id="player" style="display:none">
  <input type="range" class="player-progress" id="player-seek" min="0" max="100" value="0" />
  <div class="player-body">
    <div class="player-thumb" id="player-thumb">🎵</div>
    <div class="player-info">
      <div class="player-title" id="player-title">—</div>
      <div class="player-time" id="player-time">0:00</div>
    </div>
    <div class="player-controls">
      <button class="speed-btn" id="speed-btn" title="Playback speed">1×</button>
      <button class="ctrl-btn" id="prev-btn" title="Previous">⏮</button>
      <button class="play-btn" id="play-btn">▶</button>
      <button class="ctrl-btn" id="next-btn" title="Next">⏭</button>
    </div>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const API_KEY = window.__YT_API_KEY__ || '';

// Only allow playlists from this YouTube channel
const ALLOWED_CHANNEL_ID = 'UCu-7Clf7esddEDPeMfbRlrQ';
const ALLOWED_CHANNEL_NAME = 'LSB Audio Bible';

// ─── Bible book data ──────────────────────────────────────────────────────────
const BIBLE_BOOKS = [
  {name:'Genesis',ab:'Gen',aliases:['genesis','gen']},
  {name:'Exodus',ab:'Exod',aliases:['exodus','exod','ex']},
  {name:'Leviticus',ab:'Lev',aliases:['leviticus','lev']},
  {name:'Numbers',ab:'Num',aliases:['numbers','num']},
  {name:'Deuteronomy',ab:'Deut',aliases:['deuteronomy','deut','deu']},
  {name:'Joshua',ab:'Josh',aliases:['joshua','josh']},
  {name:'Judges',ab:'Judg',aliases:['judges','judg']},
  {name:'Ruth',ab:'Ruth',aliases:['ruth']},
  {name:'1 Samuel',ab:'1Sam',aliases:['1 samuel','1sam','i samuel']},
  {name:'2 Samuel',ab:'2Sam',aliases:['2 samuel','2sam','ii samuel']},
  {name:'1 Kings',ab:'1Kgs',aliases:['1 kings','1kgs','i kings']},
  {name:'2 Kings',ab:'2Kgs',aliases:['2 kings','2kgs','ii kings']},
  {name:'1 Chronicles',ab:'1Chr',aliases:['1 chronicles','1chr','i chronicles','1 chron']},
  {name:'2 Chronicles',ab:'2Chr',aliases:['2 chronicles','2chr','ii chronicles','2 chron']},
  {name:'Ezra',ab:'Ezra',aliases:['ezra']},
  {name:'Nehemiah',ab:'Neh',aliases:['nehemiah','neh']},
  {name:'Esther',ab:'Esth',aliases:['esther','esth']},
  {name:'Job',ab:'Job',aliases:['job']},
  {name:'Psalms',ab:'Ps',aliases:['psalms','psalm','ps','psa']},
  {name:'Proverbs',ab:'Prov',aliases:['proverbs','prov']},
  {name:'Ecclesiastes',ab:'Eccl',aliases:['ecclesiastes','eccl','ecc']},
  {name:'Song of Solomon',ab:'Song',aliases:['song of solomon','song of songs','song','sos']},
  {name:'Isaiah',ab:'Isa',aliases:['isaiah','isa']},
  {name:'Jeremiah',ab:'Jer',aliases:['jeremiah','jer']},
  {name:'Lamentations',ab:'Lam',aliases:['lamentations','lam']},
  {name:'Ezekiel',ab:'Ezek',aliases:['ezekiel','ezek','eze']},
  {name:'Daniel',ab:'Dan',aliases:['daniel','dan']},
  {name:'Hosea',ab:'Hos',aliases:['hosea','hos']},
  {name:'Joel',ab:'Joel',aliases:['joel']},
  {name:'Amos',ab:'Amos',aliases:['amos']},
  {name:'Obadiah',ab:'Obad',aliases:['obadiah','obad']},
  {name:'Jonah',ab:'Jonah',aliases:['jonah','jon']},
  {name:'Micah',ab:'Mic',aliases:['micah','mic']},
  {name:'Nahum',ab:'Nah',aliases:['nahum','nah']},
  {name:'Habakkuk',ab:'Hab',aliases:['habakkuk','hab']},
  {name:'Zephaniah',ab:'Zeph',aliases:['zephaniah','zeph']},
  {name:'Haggai',ab:'Hag',aliases:['haggai','hag']},
  {name:'Zechariah',ab:'Zech',aliases:['zechariah','zech']},
  {name:'Malachi',ab:'Mal',aliases:['malachi','mal']},
  {name:'Matthew',ab:'Matt',aliases:['matthew','matt','mt']},
  {name:'Mark',ab:'Mark',aliases:['mark','mrk','mk']},
  {name:'Luke',ab:'Luke',aliases:['luke','lk']},
  {name:'John',ab:'John',aliases:['john','jn','jhn']},
  {name:'Acts',ab:'Acts',aliases:['acts','act']},
  {name:'Romans',ab:'Rom',aliases:['romans','rom']},
  {name:'1 Corinthians',ab:'1Cor',aliases:['1 corinthians','1cor','i corinthians','1 cor']},
  {name:'2 Corinthians',ab:'2Cor',aliases:['2 corinthians','2cor','ii corinthians','2 cor']},
  {name:'Galatians',ab:'Gal',aliases:['galatians','gal']},
  {name:'Ephesians',ab:'Eph',aliases:['ephesians','eph']},
  {name:'Philippians',ab:'Phil',aliases:['philippians','phil']},
  {name:'Colossians',ab:'Col',aliases:['colossians','col']},
  {name:'1 Thessalonians',ab:'1Thess',aliases:['1 thessalonians','1thess','i thessalonians']},
  {name:'2 Thessalonians',ab:'2Thess',aliases:['2 thessalonians','2thess','ii thessalonians']},
  {name:'1 Timothy',ab:'1Tim',aliases:['1 timothy','1tim','i timothy']},
  {name:'2 Timothy',ab:'2Tim',aliases:['2 timothy','2tim','ii timothy']},
  {name:'Titus',ab:'Titus',aliases:['titus']},
  {name:'Philemon',ab:'Phlm',aliases:['philemon','phlm']},
  {name:'Hebrews',ab:'Heb',aliases:['hebrews','heb']},
  {name:'James',ab:'Jas',aliases:['james','jas']},
  {name:'1 Peter',ab:'1Pet',aliases:['1 peter','1pet','i peter']},
  {name:'2 Peter',ab:'2Pet',aliases:['2 peter','2pet','ii peter']},
  {name:'1 John',ab:'1John',aliases:['1 john','1john','i john','1jn']},
  {name:'2 John',ab:'2John',aliases:['2 john','2john','ii john']},
  {name:'3 John',ab:'3John',aliases:['3 john','3john','iii john']},
  {name:'Jude',ab:'Jude',aliases:['jude']},
  {name:'Revelation',ab:'Rev',aliases:['revelation','revelations','rev','apocalypse']},
];
const aliasMap = new Map();
BIBLE_BOOKS.forEach(b => { b.aliases.forEach(a => aliasMap.set(a, b)); aliasMap.set(b.name.toLowerCase(), b); });

function parseBibleRef(title) {
  const cleaned = title.replace(/\|.*$/,'').replace(/[-–—].*$/,'').replace(/[()[\]]/g,' ').replace(/\s+/,' ').trim();
  const m = /^((?:[123]|I{1,3})\s)?([A-Za-z]+(?:\s+of\s+[A-Za-z]+)?)\s+(?:chapter\s+)?(\d+)/i.exec(cleaned);
  if (!m) return null;
  const prefix = (m[1]||'').trim();
  const bookRaw = m[2].trim();
  const chapter = parseInt(m[3]);
  if (!chapter) return null;
  const romanMap = {I:'1',II:'2',III:'3',i:'1',ii:'2',iii:'3'};
  const candidates = prefix ? [`${prefix} ${bookRaw}`, `${romanMap[prefix]||prefix} ${bookRaw}`] : [bookRaw];
  let found = null;
  for (const c of candidates) { found = aliasMap.get(c.toLowerCase()); if (found) break; }
  if (!found) return null;
  const translations = ['NIV','KJV','ESV','NKJV','NLT','NASB','AMP','MSG','CSB','RSV','NRSV'];
  const tMatch = new RegExp(`\\b(${translations.join('|')})\\b`,'i').exec(title);
  return { book: found.name, abbrev: found.ab, chapter, translation: tMatch ? tMatch[1].toUpperCase() : null };
}

// ─── Storage ──────────────────────────────────────────────────────────────────
function loadLibrary() { try { return JSON.parse(localStorage.getItem('ab:library')||'[]'); } catch { return []; } }
function saveLibrary(lib) { localStorage.setItem('ab:library', JSON.stringify(lib)); }
function loadPlayback() { try { return JSON.parse(localStorage.getItem('ab:playback')||'null'); } catch { return null; } }
function savePlayback(s) { localStorage.setItem('ab:playback', JSON.stringify(s)); }
function loadListened() { try { return JSON.parse(localStorage.getItem('ab:listened')||'[]'); } catch { return []; } }
function saveListened(l) { localStorage.setItem('ab:listened', JSON.stringify(l)); }
function isListened(vid, plid) { return loadListened().some(i => i.v === vid && i.p === plid); }
function markListened(vid, plid) { const l = loadListened(); if (!isListened(vid,plid)) { l.push({v:vid,p:plid,t:Date.now()}); saveListened(l); } }
function unmarkListened(vid, plid) { saveListened(loadListened().filter(i => !(i.v===vid&&i.p===plid))); }
function listenedCount(plid) { return loadListened().filter(i => i.p===plid).length; }

// ─── YouTube API ──────────────────────────────────────────────────────────────
function parsePlaylistId(url) {
  url = url.trim();
  if (/^(PL|FL|RD|OL|LL|UU)[A-Za-z0-9_-]{10,}$/.test(url)) return url;
  try { const u = new URL(url.includes('://')?url:'https://'+url); const l = u.searchParams.get('list'); if(l) return l; } catch {}
  const m = /[?&]list=([A-Za-z0-9_-]+)/.exec(url);
  return m ? m[1] : null;
}

async function fetchPlaylist(plid) {
  const key = getApiKey();
  const metaRes = await fetch(`https://www.googleapis.com/youtube/v3/playlists?part=snippet,contentDetails&id=${plid}&key=${key}`);
  if (!metaRes.ok) throw new Error(`YouTube API error ${metaRes.status}`);
  const metaData = await metaRes.json();
  if (!metaData.items || !metaData.items.length) throw new Error('Playlist not found. Make sure it is public.');
  const snippet = metaData.items[0].snippet;
  const metadata = {
    id: plid,
    title: snippet.localized?.title || snippet.title,
    channelTitle: snippet.channelTitle,
    thumbnail: snippet.thumbnails?.high?.url || snippet.thumbnails?.medium?.url || '',
    itemCount: metaData.items[0].contentDetails?.itemCount || 0,
  };
  const items = [];
  let pageToken = '';
  do {
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${plid}&maxResults=50&key=${key}${pageToken?'&pageToken='+pageToken:''}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`YouTube API error ${res.status}`);
    const data = await res.json();
    for (const item of data.items) {
      const vid = item.snippet.resourceId?.videoId;
      if (!vid) continue;
      items.push({
        videoId: vid,
        title: item.snippet.title,
        thumbnail: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
        position: item.snippet.position,
        bibleRef: parseBibleRef(item.snippet.title),
      });
    }
    pageToken = data.nextPageToken || '';
  } while (pageToken && items.length < 500);
  return { metadata, items };
}

// ─── State ────────────────────────────────────────────────────────────────────
let currentPlaylist = null;
let currentTrackIndex = 0;
let ytPlayer = null;
let ytReady = false;
let isPlaying = false;
let currentTime = 0;
let duration = 0;
let tickInterval = null;
let saveTimer = null;
let currentView = 'list';
const SPEEDS = [0.75, 1, 1.25, 1.5, 1.75, 2];
let speedIndex = 1;

// ─── YouTube IFrame API ───────────────────────────────────────────────────────
window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  if (pendingPlay) { const p = pendingPlay; pendingPlay = null; playTrack(p.index, p.start); }
};
let pendingPlay = null;

(function loadYTScript() {
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

function playTrack(index, startSeconds) {
  if (!currentPlaylist) return;
  startSeconds = startSeconds || 0;
  currentTrackIndex = index;
  const track = currentPlaylist.items[index];
  if (!track) return;

  if (!ytReady) { pendingPlay = {index, start: startSeconds}; return; }

  if (!ytPlayer) {
    ytPlayer = new YT.Player('yt-player', {
      videoId: track.videoId,
      playerVars: { autoplay:1, start:Math.floor(startSeconds), controls:0, modestbranding:1, rel:0, playsinline:1, iv_load_policy:3 },
      events: {
        onReady: () => { isPlaying = true; updatePlayerUI(); startTick(); },
        onStateChange: (e) => {
          if (e.data === 1) { isPlaying = true; updatePlayerUI(); startTick(); }
          else if (e.data === 2) { isPlaying = false; updatePlayerUI(); stopTick(); }
          else if (e.data === 0) { onTrackEnded(); }
          else { isPlaying = false; updatePlayerUI(); }
        }
      }
    });
  } else {
    ytPlayer.loadVideoById({ videoId: track.videoId, startSeconds });
    isPlaying = true;
  }

  updatePlayerUI();
  renderTrackList();
  saveCurrentPlayback();
}

function onTrackEnded() {
  if (!currentPlaylist) return;
  markListened(currentPlaylist.items[currentTrackIndex].videoId, currentPlaylist.metadata.id);
  renderTrackList();
  updateProgress();
  if (currentTrackIndex < currentPlaylist.items.length - 1) {
    playTrack(currentTrackIndex + 1, 0);
  } else {
    isPlaying = false;
    updatePlayerUI();
  }
}

function startTick() {
  stopTick();
  tickInterval = setInterval(() => {
    if (!ytPlayer || !isPlaying) return;
    try {
      currentTime = ytPlayer.getCurrentTime() || 0;
      duration = ytPlayer.getDuration() || 0;
      updateTimeUI();
      scheduleSave();
    } catch(e) {}
  }, 1000);
}
function stopTick() { if (tickInterval) { clearInterval(tickInterval); tickInterval = null; } }
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentPlayback, 2000);
}
function saveCurrentPlayback() {
  if (!currentPlaylist) return;
  const track = currentPlaylist.items[currentTrackIndex];
  if (!track) return;
  savePlayback({ plid: currentPlaylist.metadata.id, vid: track.videoId, idx: currentTrackIndex, ts: currentTime, at: Date.now() });
}

function formatTime(s) {
  if (!isFinite(s)||s<0) return '0:00';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60);
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function updateTimeUI() {
  const track = currentPlaylist?.items[currentTrackIndex];
  document.getElementById('player-time').textContent = `${formatTime(currentTime)}${duration>0?' / '+formatTime(duration):''}`;
  const seek = document.getElementById('player-seek');
  seek.max = duration || 100;
  seek.value = currentTime;
}

function updatePlayerUI() {
  const track = currentPlaylist?.items[currentTrackIndex];
  if (!track) return;
  document.getElementById('player').style.display = 'block';
  const ref = track.bibleRef;
  document.getElementById('player-title').textContent = ref ? `${ref.book} ${ref.chapter}` : track.title;
  const thumb = document.getElementById('player-thumb');
  if (track.thumbnail) {
    thumb.innerHTML = `<img src="${track.thumbnail}" style="width:42px;height:42px;border-radius:8px;object-fit:cover;" />`;
  } else {
    thumb.textContent = '🎵';
  }
  document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('prev-btn').disabled = currentTrackIndex === 0;
  document.getElementById('next-btn').disabled = !currentPlaylist || currentTrackIndex >= currentPlaylist.items.length - 1;

  // Update now playing card
  const card = document.getElementById('now-playing-card');
  if (card) {
    card.style.display = 'block';
    document.getElementById('now-playing-title').textContent = ref ? `${ref.book} ${ref.chapter}${ref.translation?' · '+ref.translation:''}` : track.title;
  }
}

// ─── Player controls ──────────────────────────────────────────────────────────
document.getElementById('play-btn').addEventListener('click', () => {
  if (!ytPlayer) return;
  if (isPlaying) { ytPlayer.pauseVideo(); } else { ytPlayer.playVideo(); }
});
document.getElementById('prev-btn').addEventListener('click', () => {
  if (currentTrackIndex > 0) playTrack(currentTrackIndex - 1, 0);
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (currentPlaylist && currentTrackIndex < currentPlaylist.items.length - 1) playTrack(currentTrackIndex + 1, 0);
});
document.getElementById('player-seek').addEventListener('input', (e) => {
  const t = Number(e.target.value);
  currentTime = t;
  ytPlayer?.seekTo(t, true);
  updateTimeUI();
});
document.getElementById('speed-btn').addEventListener('click', () => {
  speedIndex = (speedIndex + 1) % SPEEDS.length;
  const rate = SPEEDS[speedIndex];
  document.getElementById('speed-btn').textContent = rate + '×';
  ytPlayer?.setPlaybackRate(rate);
});

// ─── Import ───────────────────────────────────────────────────────────────────
document.getElementById('sync-btn').addEventListener('click', doSync);

async function fetchChannelPlaylists() {
  const key = getApiKey();
  const channelId = ALLOWED_CHANNEL_ID;
  const playlists = [];
  let pageToken = '';
  do {
    const url = `https://www.googleapis.com/youtube/v3/playlists?part=snippet,contentDetails&channelId=${channelId}&maxResults=50&key=${key}${pageToken?'&pageToken='+pageToken:''}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`YouTube API error ${res.status}`);
    const data = await res.json();
    for (const item of data.items) {
      playlists.push({
        id: item.id,
        title: item.snippet.localized?.title || item.snippet.title,
        channelTitle: item.snippet.channelTitle,
        thumbnail: item.snippet.thumbnails?.high?.url || item.snippet.thumbnails?.medium?.url || '',
        itemCount: item.contentDetails?.itemCount || 0,
      });
    }
    pageToken = data.nextPageToken || '';
  } while (pageToken);
  return playlists;
}

async function doSync() {
  const btn = document.getElementById('sync-btn');
  const errEl = document.getElementById('import-error');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Syncing playlists…';
  errEl.style.display = 'none';
  try {
    const channelPlaylists = await fetchChannelPlaylists();
    if (!channelPlaylists.length) throw new Error('No playlists found on this channel.');
    
    btn.innerHTML = `<span class="spinner"></span>Loading ${channelPlaylists.length} playlists…`;
    
    const lib = loadLibrary();
    let added = 0;
    for (let i = 0; i < channelPlaylists.length; i++) {
      const pl = channelPlaylists[i];
      btn.innerHTML = `<span class="spinner"></span>Loading playlist ${i+1} of ${channelPlaylists.length}…`;
      // Skip if already imported (dont re-fetch)
      if (lib.find(p => p.metadata.id === pl.id)) continue;
      try {
        const items = await fetchPlaylistItemsOnly(pl.id);
        if (!items.length) continue;
        const saved = { metadata: pl, items, importedAt: Date.now() };
        lib.unshift(saved);
        added++;
      } catch(e) {
        // skip playlists that fail
      }
    }
    saveLibrary(lib);
    renderHome();
    errEl.style.display = 'flex';
    errEl.style.color = '#34d399';
    errEl.textContent = added > 0 ? `✓ Added ${added} new playlist${added>1?'s':''} from LSB Audio Bible.` : '✓ Library is already up to date.';
  } catch(err) {
    errEl.style.display = 'flex';
    errEl.style.color = '#f87171';
    errEl.textContent = '⚠ ' + (err.message || 'Sync failed.');
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 Sync Playlists from LSB Audio Bible';
  }
}

  const key = getApiKey();
  const items = [];
  let pageToken = '';
  do {
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${plid}&maxResults=50&key=${key}${pageToken?'&pageToken='+pageToken:''}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`YouTube API error ${res.status}`);
    const data = await res.json();
    for (const item of data.items) {
      const vid = item.snippet.resourceId?.videoId;
      if (!vid) continue;
      items.push({
        videoId: vid,
        title: item.snippet.title,
        thumbnail: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',

        bibleRef: parseBibleRef(item.snippet.title),

    }

  } while (pageToken && items.length < 500);
  return items;
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  window.scrollTo(0,0);
}

document.getElementById('nav-library').addEventListener('click', e => { e.preventDefault(); showPage('library'); renderLibrary(); });
document.getElementById('library-back').addEventListener('click', () => showPage('home'));
document.getElementById('playlist-back').addEventListener('click', () => showPage('home'));

// ─── Home ─────────────────────────────────────────────────────────────────────
function renderHome() {
  const lib = loadLibrary();
  document.getElementById('nav-library').style.display = lib.length ? 'inline' : 'none';

  // Continue listening
  const continueEl = document.getElementById('continue-section');

    const pl = lib.find(p => p.metadata.id === pb.plid);

          <div class="continue-card" id="continue-btn">
            <div class="continue-thumb">${track.thumbnail ? `<img src="${track.thumbnail}" style="width:52px;height:52px;border-radius:10px;object-fit:cover;">` : '🎵'}</div>
            <div style="flex:1;min-width:0">
              <div class="continue-label">Continue listening</div>

              <div class="continue-sub">${pl.metadata.title}</div>
            </div>
            <span style="color:#0ea5e9;font-size:28px;">⏯</span>
          </div>`;
        document.getElementById('continue-btn').addEventListener('click', () => {
          currentPlaylist = pl;
          openPlaylist(pl, pb.idx, pb.ts);
        });
      }
    }
  } else { continueEl.innerHTML = ''; }

  // Library preview
  const previewEl = document.getElementById('library-preview');
  if (!lib.length) {
    previewEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div><p>No playlists yet</p><p style="font-size:12px;margin-top:6px;">Paste a YouTube playlist URL above</p></div>`;
    return;
  }
  const shown = lib.slice(0, 4);

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <h2 style="font-size:16px;font-weight:600;">Your library</h2>
      ${lib.length > 4 ? `<a href="#" id="see-all" style="font-size:13px;color:#0ea5e9;text-decoration:none;">See all</a>` : ''}
    </div>
    <div class="playlist-grid">${shown.map(pl => playlistCardHTML(pl)).join('')}</div>`;
  document.querySelectorAll('.open-playlist').forEach(el => {
    el.addEventListener('click', () => { const pl = lib.find(p => p.metadata.id === el.dataset.id); if(pl) openPlaylist(pl); });

function playlistCardHTML(pl) {
  const count = pl.items.length;
  const lc = listenedCount(pl.metadata.id);
  const pct = count > 0 ? Math.round(lc/count*100) : 0;
  const hasBible = pl.items.some(t => t.bibleRef);
  return `
    <div class="playlist-card open-playlist" data-id="${pl.metadata.id}">
      <div class="playlist-thumb">${pl.metadata.thumbnail ? `<img src="${pl.metadata.thumbnail}" alt="">` : '📖'}</div>
      <div class="playlist-info">
        <div class="playlist-title">${pl.metadata.title}</div>
        <div class="playlist-actions">
          <div class="playlist-meta">${count} tracks · ${pl.metadata.channelTitle}</div>
          <button class="btn-danger delete-playlist" data-id="${pl.metadata.id}">Remove</button>
        </div>
        ${lc > 0 ? `<div class="progress-bar-wrap"><div class="progress-label"><span>${lc}/${count} listened</span><span>${pct}%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div></div>` : ''}
        ${hasBible ? '<span class="tag">Bible parsed</span>' : ''}
      </div>
    </div>`;
}

function deletePlaylist(id) {
  if (!confirm('Remove this playlist from your library?')) return;
  saveLibrary(loadLibrary().filter(p => p.metadata.id !== id));
  renderHome();
  renderLibrary();
}

// ─── Library ──────────────────────────────────────────────────────────────────
function renderLibrary() {
  const lib = loadLibrary();
  const el = document.getElementById('library-grid');
  if (!lib.length) {
    el.innerHTML = `<div class="empty-state"><p>Your library is empty</p></div>`;
    return;
  }
  el.innerHTML = `<div class="playlist-grid">${lib.map(pl => playlistCardHTML(pl)).join('')}</div>`;
  document.querySelectorAll('.open-playlist').forEach(el => {
    el.addEventListener('click', () => { const pl = lib.find(p => p.metadata.id === el.dataset.id); if(pl) openPlaylist(pl); });
  });
  document.querySelectorAll('.delete-playlist').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); deletePlaylist(el.dataset.id); renderLibrary(); });
  });
}

// ─── Playlist detail ──────────────────────────────────────────────────────────
function openPlaylist(pl, resumeIdx, resumeTs) {
  currentPlaylist = pl;
  showPage('playlist');
  document.getElementById('playlist-header-title').textContent = pl.metadata.title;
  const hasBible = pl.items.some(t => t.bibleRef);
  document.getElementById('view-toggle-wrap').style.display = hasBible ? 'flex' : 'none';
  renderTrackList();
  updateProgress();

  const startIdx = resumeIdx != null ? resumeIdx : 0;
  const startTs = resumeTs || 0;
  playTrack(startIdx, startTs);
}

function updateProgress() {
  if (!currentPlaylist) return;
  const total = currentPlaylist.items.length;
  const lc = listenedCount(currentPlaylist.metadata.id);
  const pct = total > 0 ? Math.round(lc/total*100) : 0;
  document.getElementById('playlist-header-meta').textContent = `${total} tracks · ${pct}% listened`;
  const bar = document.getElementById('playlist-progress-bar');
  bar.style.display = lc > 0 ? 'block' : 'none';
  document.getElementById('playlist-progress-fill').style.width = pct + '%';
}

function setView(v) {
  currentView = v;
  document.getElementById('view-list-btn').className = 'view-btn' + (v==='list'?' active':'');
  document.getElementById('view-books-btn').className = 'view-btn' + (v==='books'?' active':'');
  renderTrackList();
}

function renderTrackList() {
  if (!currentPlaylist) return;
  const query = document.getElementById('track-search').value.toLowerCase();
  const tracks = currentPlaylist.items.filter(t =>
    !query || t.title.toLowerCase().includes(query) || (t.bibleRef?.book.toLowerCase().includes(query))
  );

  if (currentView === 'books' && currentPlaylist.items.some(t => t.bibleRef)) {
    document.getElementById('track-list').style.display = 'none';
    document.getElementById('book-nav').style.display = 'block';
    renderBookNav(tracks);
  } else {
    document.getElementById('track-list').style.display = 'block';
    document.getElementById('book-nav').style.display = 'none';
    renderListView(tracks);
  }
}

function renderListView(tracks) {
  const el = document.getElementById('track-list');
  if (!tracks.length) { el.innerHTML = `<div class="empty-state"><p>No tracks found</p></div>`; return; }
  el.innerHTML = tracks.map((track, i) => {
    const isActive = track.videoId === currentPlaylist.items[currentTrackIndex]?.videoId;
    const done = isListened(track.videoId, currentPlaylist.metadata.id);
    const ref = track.bibleRef;
    return `
      <div class="track-row ${isActive?'active':''}" data-idx="${track.position}">
        <div class="track-num">
          ${isActive ? `<div class="playing-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>` : track.position+1}
        </div>
        <div style="flex:1;min-width:0;">
          <div class="track-title ${isActive?'active':''}">${track.title}</div>
          ${ref ? `<div class="track-ref">${ref.book} ${ref.chapter}${ref.translation?' · '+ref.translation:''}</div>` : ''}
        </div>
        <button class="check-btn ${done?'done':''}" data-vid="${track.videoId}" title="${done?'Listened':'Mark listened'}">✓</button>
      </div>`;
  }).join('');

  el.querySelectorAll('.track-row').forEach(row => {
    row.addEventListener('click', () => playTrack(parseInt(row.dataset.idx), 0));
  });
  el.querySelectorAll('.check-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const vid = btn.dataset.vid;
      const plid = currentPlaylist.metadata.id;
      if (isListened(vid, plid)) { unmarkListened(vid, plid); btn.className='check-btn'; }
      else { markListened(vid, plid); btn.className='check-btn done'; }
      updateProgress();
    });
  });

  // Scroll active into view
  const activeRow = el.querySelector('.track-row.active');
  if (activeRow) activeRow.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function renderBookNav(tracks) {
  const el = document.getElementById('book-nav');
  const groups = new Map();
  for (const t of tracks) {
    if (!t.bibleRef) continue;
    if (!groups.has(t.bibleRef.book)) groups.set(t.bibleRef.book, { abbrev: t.bibleRef.abbrev, tracks: [] });
    groups.get(t.bibleRef.book).tracks.push(t);
  }
  const activeVid = currentPlaylist.items[currentTrackIndex]?.videoId;
  el.innerHTML = Array.from(groups.entries()).map(([book, g]) => {
    const hasActive = g.tracks.some(t => t.videoId === activeVid);
    return `
      <div class="book-group">
        <button class="book-header" onclick="toggleBook('${book}')">
          <span style="display:flex;align-items:center;gap:10px;">
            <span style="background:#1a1a24;padding:4px 8px;border-radius:6px;font-size:11px;color:#94a3b8;">${g.abbrev}</span>
            <span style="${hasActive?'color:#0ea5e9':''}">${book}</span>
            <span style="font-size:12px;color:#4a4a6a;">${g.tracks.length} ch.</span>
          </span>
          <span id="chevron-${book}" style="color:#4a4a6a;transition:transform 0.2s;">▼</span>
        </button>
        <div id="book-chapters-${book}" style="display:none;" class="book-chapters">
          ${g.tracks.map(t => {
            const isActive = t.videoId === activeVid;
            const done = isListened(t.videoId, currentPlaylist.metadata.id);
            return `<button class="ch-btn ${isActive?'active':done?'done':''}" onclick="playTrack(${t.position},0)">${t.bibleRef.chapter}</button>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

function toggleBook(book) {
  const el = document.getElementById('book-chapters-'+book);
  const ch = document.getElementById('chevron-'+book);
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'grid';
  ch.style.transform = open ? '' : 'rotate(180deg)';
}

document.getElementById('track-search').addEventListener('input', () => renderTrackList());

// ─── Init ─────────────────────────────────────────────────────────────────────
renderHome();
